name: Build APK From Game ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "vtuber_game_v1_source.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Unzip game source
        run: |
          rm -rf extracted_game
          mkdir extracted_game
          unzip -q vtuber_game_v1_source.zip -d extracted_game
          echo "Extracted files:"
          find extracted_game -maxdepth 4 -type f | sort

      - name: Find Android project
        id: find_project
        run: |
          PROJECT_DIR=$(find extracted_game -name "settings.gradle" -type f -printf "%h\n" | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "settings.gradle が見つかりません。ZIPの中身がAndroidプロジェクトではない可能性があります。"
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project directory: $PROJECT_DIR"

      - name: Build debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: gradle :app:assembleDebug --no-daemon

      - name: Copy APK to upload folder
        run: |
          mkdir -p apk_output
          cp "${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk" apk_output/vtuber-game-v1-debug.apk
          ls -la apk_output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-game-v1-debug-apk
          path: apk_output/vtuber-game-v1-debug.apk
